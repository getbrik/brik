# Brik Package Stage
# Container build (conditional - only if package section configured).

brik-package:
  stage: package
  needs:
    - job: brik-test
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage package'
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: manual
      allow_failure: true
