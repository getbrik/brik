# Brik Package Stage
# Container build (conditional - only if package section configured).

brik-package:
  stage: package
  needs:
    - job: brik-build
      artifacts: true
    - job: brik-test
      artifacts: true
    - job: brik-quality
      artifacts: false
      optional: true
    - job: brik-security
      artifacts: false
      optional: true
  script:
    # Install Docker CLI if socket is available (needed for docker build/push)
    - |
      if [ -S /var/run/docker.sock ] && ! command -v docker >/dev/null 2>&1; then
        echo "[brik] Installing Docker CLI..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache docker-cli
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq docker.io
        fi
      fi
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage package'
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never
