# Brik Test Stage
# Runs tests via brik-lib.

brik-test:
  stage: test
  needs:
    - job: brik-init
      artifacts: true
    - job: brik-build
      artifacts: true
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage test'
  artifacts:
    when: always
    reports:
      junit: reports/*.xml
    paths:
      - coverage/
      - reports/
    expire_in: 1 week
