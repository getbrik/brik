# Brik Test Stage
# Runs tests via brik-lib.

brik-test:
  stage: test
  needs:
    - job: brik-build
      artifacts: true
  script:
    - brik.gitlab.run_stage test
  artifacts:
    when: always
    reports:
      junit: reports/*.xml
    paths:
      - coverage/
      - reports/
    expire_in: 1 week
