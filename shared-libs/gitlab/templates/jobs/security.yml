# Brik Security Stage
# Dependency and secret scanning. Runs in parallel with Quality (same GitLab stage).

brik-security:
  stage: quality
  needs:
    - job: brik-build
      artifacts: true
  script:
    - brik.gitlab.run_stage security
  rules:
    - if: '$BRIK_SECURITY_ENABLED == "false"'
      when: never
    - when: on_success
  allow_failure: true
