# Brik Init Stage
# Detects stack, validates brik.yml, sets up environment.

brik-init:
  stage: init
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage init'
  artifacts:
    reports:
      dotenv: brik-init.env
    expire_in: 1 hour
  after_script:
    # Export key variables as dotenv for downstream jobs
    # Note: after_script runs in a separate shell, so we read brik.yml directly
    - |
      STACK="auto"
      STACK_VERSION=""
      if command -v yq >/dev/null 2>&1 && [ -f brik.yml ]; then
        STACK="$(yq '.project.stack // "auto"' brik.yml)"
        STACK_VERSION="$(yq '.project.stack_version // ""' brik.yml)"
      fi
      PROJECT_NAME="unnamed"
      if command -v yq >/dev/null 2>&1 && [ -f brik.yml ]; then
        PROJECT_NAME="$(yq '.project.name // "unnamed"' brik.yml)"
      fi
      # Resolve runner image from stack + version
      BRIK_HOME="${BRIK_HOME:-/opt/brik}"
      RUNNER_IMAGE=""
      if [ -f "${BRIK_HOME}/runtime/bash/lib/runtime/runner-images.sh" ]; then
        . "${BRIK_HOME}/runtime/bash/lib/runtime/runner-images.sh"
        RUNNER_IMAGE="$(runner.resolve_image "$STACK" "$STACK_VERSION" 2>/dev/null)" || true
      fi
      [ -z "$RUNNER_IMAGE" ] && RUNNER_IMAGE="ghcr.io/getbrik/brik-runner-base:latest"
      # Read lint-enable flag from brik.yml (quality.lint.enabled, default true)
      LINT_ENABLED="true"
      if command -v yq >/dev/null 2>&1 && [ -f brik.yml ]; then
        LINT_ENABLED="$(yq '.quality.lint.enabled // true' brik.yml)"
      fi
      echo "[brik:init] stack=${STACK} version=${STACK_VERSION:-<default>} -> image=${RUNNER_IMAGE}"
      echo "[brik:init] lint_enabled=${LINT_ENABLED}"
      {
        echo "BRIK_BUILD_STACK=${STACK}"
        echo "BRIK_BUILD_STACK_VERSION=${STACK_VERSION}"
        echo "BRIK_CI_IMAGE=${RUNNER_IMAGE}"
        echo "BRIK_PROJECT_NAME=${PROJECT_NAME}"
        echo "BRIK_LINT_ENABLED=${LINT_ENABLED}"
      } > brik-init.env
