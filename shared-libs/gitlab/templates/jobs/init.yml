# Brik Init Stage
# Detects stack, validates brik.yml, sets up environment.

brik-init:
  stage: init
  script:
    - brik.gitlab.run_stage init
  artifacts:
    reports:
      dotenv: brik-init.env
    expire_in: 1 hour
  after_script:
    # Export key variables as dotenv for downstream jobs
    - |
      {
        echo "BRIK_BUILD_STACK=${BRIK_BUILD_STACK:-auto}"
        echo "BRIK_PROJECT_NAME=${BRIK_PROJECT_NAME:-unnamed}"
        echo "BRIK_QUALITY_ENABLED=${BRIK_QUALITY_ENABLED:-true}"
        echo "BRIK_SECURITY_ENABLED=${BRIK_SECURITY_ENABLED:-false}"
      } > brik-init.env
