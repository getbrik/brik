# Brik Lint Stage
# Code quality checks: lint, format, type_check.
# Runs in the CI (stack) image alongside SAST, Scan, and Test (all in verify stage).

brik-lint:
  stage: verify
  needs:
    - job: brik-init
      artifacts: true
    - job: brik-build
      artifacts: true
  cache:
    key: "${BRIK_BUILD_STACK}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .npm/
      - .cache/pip
      - .m2/repository
      - .gradle/caches
      - .gradle/wrapper
      - .cargo/registry
      - .cargo/git
      - .nuget/packages
    fallback_keys:
      - "${BRIK_BUILD_STACK}-${CI_DEFAULT_BRANCH}"
      - "${BRIK_BUILD_STACK}-default"
    policy: pull
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage lint'
  rules:
    - if: '$BRIK_LINT_ENABLED == "false"'
      when: never
    - when: on_success
