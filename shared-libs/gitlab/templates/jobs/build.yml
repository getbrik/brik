# Brik Build Stage
# Compiles/builds the project via brik-lib.

brik-build:
  stage: build
  needs:
    - job: brik-init
      artifacts: true
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage build'
  artifacts:
    paths:
      - dist/
      - build/
      - target/
      - bin/
      - "*.whl"
      - "*.tar.gz"
    exclude:
      - node_modules/
      - .venv/
      - __pycache__/
    expire_in: 1 hour
