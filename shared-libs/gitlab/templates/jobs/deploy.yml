# Brik Deploy Stage
# Deploys to target environments configured in brik.yml.
# The runtime evaluates deploy.environments[].when conditions
# and skips environments that don't match the current Git context.
# If no deploy.environments is configured, the runtime skips gracefully.

brik-deploy:
  stage: deploy
  needs:
    - job: brik-test
    - job: brik-package
      artifacts: false
      optional: true
    - job: brik-lint
      artifacts: false
      optional: true
    - job: brik-sast
      artifacts: false
      optional: true
    - job: brik-scan
      artifacts: false
      optional: true
    - job: brik-container-scan
      artifacts: false
      optional: true
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage deploy'
