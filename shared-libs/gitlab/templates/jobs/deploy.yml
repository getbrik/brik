# Brik Deploy Stage
# Deploys to target environment (conditional).

brik-deploy:
  stage: deploy
  needs:
    - job: brik-test
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage deploy'
  rules:
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: manual
      allow_failure: true
