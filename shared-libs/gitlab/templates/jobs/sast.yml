# Brik SAST Stage
# Static analysis: SAST (semgrep), license scanning, IaC (checkov).
# Runs in the analysis image (Python/Ruby runtime).

brik-sast:
  stage: verify
  image: "${BRIK_ANALYSIS_IMAGE}"
  needs:
    - job: brik-init
      artifacts: true
    - job: brik-build
      artifacts: true
  cache:
    key: "${BRIK_BUILD_STACK}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .npm/
      - .cache/pip
      - .m2/repository
      - .gradle/caches
      - .gradle/wrapper
      - .cargo/registry
      - .cargo/git
      - .nuget/packages
    fallback_keys:
      - "${BRIK_BUILD_STACK}-${CI_DEFAULT_BRANCH}"
      - "${BRIK_BUILD_STACK}-default"
    policy: pull
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage sast'
  # No rules: SAST is non-negotiable (always runs with defaults)
