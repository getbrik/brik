# Brik Quality Stage
# Lint and format checks. Runs in parallel with Security (same GitLab stage).
#
# Note: the rules: check below only works when BRIK_QUALITY_ENABLED is set
# as a CI/CD variable at the project/group level. Dotenv variables from
# brik-init are NOT available at rules evaluation time (pipeline creation).
# The runtime fallback in quality.sh handles the dotenv-based check.

brik-quality:
  stage: quality
  image: "${BRIK_QUALITY_IMAGE}"
  needs:
    - job: brik-init
      artifacts: true
    - job: brik-build
      artifacts: true
  cache:
    key: "${BRIK_BUILD_STACK}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .npm/
      - .cache/pip
      - .m2/repository
      - .gradle/caches
      - .gradle/wrapper
      - .cargo/registry
      - .cargo/git
      - .nuget/packages
    fallback_keys:
      - "${BRIK_BUILD_STACK}-${CI_DEFAULT_BRANCH}"
      - "${BRIK_BUILD_STACK}-default"
    policy: pull
  script:
    - bash -c '. /tmp/brik-bootstrap.sh && brik.gitlab.run_stage quality'
  rules:
    - if: '$BRIK_QUALITY_ENABLED == "false"'
      when: never
    - when: on_success
