# Brik GitLab CI Pipeline Template
#
# This is the main entry point for Brik pipelines on GitLab CI.
# It implements the fixed flow: Init -> Release -> Build -> Quality||Security -> Test -> Package -> Deploy -> Notify
#
# Usage in your .gitlab-ci.yml:
#   include:
#     - project: 'brik/gitlab-templates'
#       ref: v1
#       file: '/templates/pipeline.yml'

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  BRIK_VERSION: "v0.1.0"
  BRIK_REPO: "${CI_SERVER_URL}/brik/brik.git"
  BRIK_HOME: "/opt/brik"
  BRIK_LOG_DIR: "/tmp/brik/logs"
  BRIK_LOG_LEVEL: "info"
  BRIK_PLATFORM: "gitlab"

# ---------------------------------------------------------------------------
# Stages - Fixed Flow
# ---------------------------------------------------------------------------
stages:
  - init
  - release
  - build
  - quality
  - test
  - package
  - deploy
  - notify

# ---------------------------------------------------------------------------
# Default job configuration
# ---------------------------------------------------------------------------
default:
  before_script:
    # Install yq if not present
    - |
      if ! command -v yq >/dev/null 2>&1; then
        echo "[brik] Installing yq..."
        YQ_VERSION="v4.44.1"
        YQ_ARCH="$(uname -m)"
        case "$YQ_ARCH" in
          x86_64)  YQ_ARCH="amd64" ;;
          aarch64) YQ_ARCH="arm64" ;;
        esac
        wget -qO /usr/local/bin/yq \
          "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_${YQ_ARCH}" \
          && chmod +x /usr/local/bin/yq
      fi
    # Install jq if not present
    - |
      if ! command -v jq >/dev/null 2>&1; then
        echo "[brik] Installing jq..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache jq
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq jq
        fi
      fi
    # Install git if not present
    - |
      if ! command -v git >/dev/null 2>&1; then
        echo "[brik] Installing git..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache git
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq git
        fi
      fi
    # Install bash if not present
    - |
      if ! command -v bash >/dev/null 2>&1; then
        echo "[brik] Installing bash..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache bash
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq bash
        fi
      fi
    # Install stack tools if needed
    - |
      if [ "${BRIK_BUILD_STACK:-}" = "node" ] && ! command -v node >/dev/null 2>&1; then
        echo "[brik] Installing Node.js..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache nodejs npm
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq nodejs npm
        fi
      fi
    - |
      if [ "${BRIK_BUILD_STACK:-}" = "python" ] && ! command -v python3 >/dev/null 2>&1; then
        echo "[brik] Installing Python..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache python3 py3-pip py3-setuptools
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-setuptools
        fi
      fi
    # Remove PEP 668 marker and install dependencies in CI containers (ephemeral)
    - |
      if [ "${BRIK_BUILD_STACK:-}" = "python" ] && command -v python3 >/dev/null 2>&1; then
        EXTERNALLY_MANAGED=$(python3 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")/EXTERNALLY-MANAGED
        rm -f "$EXTERNALLY_MANAGED"
        if [ -f pyproject.toml ] || [ -f setup.py ]; then
          pip install --quiet . 2>/dev/null || true
        elif [ -f requirements.txt ]; then
          pip install --quiet -r requirements.txt 2>/dev/null || true
        fi
      fi
    # Install Docker CLI if socket is available (needed for package stage)
    - |
      if [ -S /var/run/docker.sock ] && ! command -v docker >/dev/null 2>&1; then
        echo "[brik] Installing Docker CLI..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache docker-cli
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq docker.io
        fi
      fi
    # Clone the Brik runtime if not already present
    - |
      if [ ! -d "${BRIK_HOME}" ]; then
        echo "[brik] Cloning Brik runtime (${BRIK_VERSION})..."
        git clone --depth 1 --branch "${BRIK_VERSION}" "${BRIK_REPO}" "${BRIK_HOME}" 2>/dev/null \
          || git clone --depth 1 "${BRIK_REPO}" "${BRIK_HOME}"
      fi
    # Prepare Brik bootstrap script (sourced by each job via bash)
    - |
      cat > /tmp/brik-bootstrap.sh << 'BRIK_EOF'
      . "${BRIK_HOME}/shared-libs/gitlab/scripts/stage-wrapper.sh"
      brik.gitlab.setup "${BRIK_HOME}"
      BRIK_EOF
      chmod +x /tmp/brik-bootstrap.sh

# ---------------------------------------------------------------------------
# Include job templates
# ---------------------------------------------------------------------------
include:
  - local: '/templates/jobs/init.yml'
  - local: '/templates/jobs/release.yml'
  - local: '/templates/jobs/build.yml'
  - local: '/templates/jobs/quality.yml'
  - local: '/templates/jobs/security.yml'
  - local: '/templates/jobs/test.yml'
  - local: '/templates/jobs/package.yml'
  - local: '/templates/jobs/deploy.yml'
  - local: '/templates/jobs/notify.yml'
