# Brik GitLab CI Pipeline Template
#
# This is the main entry point for Brik pipelines on GitLab CI.
# It implements the fixed flow: Init -> Release -> Build -> Quality||Security -> Test -> Package -> Deploy -> Notify
#
# Usage in your .gitlab-ci.yml:
#   include:
#     - project: 'brik/gitlab-templates'
#       ref: v1
#       file: '/templates/pipeline.yml'

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------
variables:
  BRIK_LIB_REF: "v0.1.0"
  BRIK_REPO: "${CI_SERVER_URL}/brik/brik.git"
  BRIK_HOME: "/opt/brik"
  BRIK_LOG_DIR: "/tmp/brik/logs"
  BRIK_LOG_LEVEL: "info"
  BRIK_PLATFORM: "gitlab"
  BRIK_CI_IMAGE: "alpine:3.21@sha256:c3f8e73fdb79deaebaa2037150150191b9dcbfba68b4a46d70103204c53f4709"

# ---------------------------------------------------------------------------
# Stages - Fixed Flow
# ---------------------------------------------------------------------------
stages:
  - init
  - release
  - build
  - quality
  - test
  - package
  - deploy
  - notify

# ---------------------------------------------------------------------------
# Default job configuration
# ---------------------------------------------------------------------------
default:
  image: ${BRIK_CI_IMAGE}
  before_script:
    # Bootstrap prerequisites (yq, jq, git, bash) before BRIK_HOME is available
    - |
      if [ -f "${BRIK_HOME}/scripts/bootstrap-prereqs.sh" ]; then
        . "${BRIK_HOME}/scripts/bootstrap-prereqs.sh"
        bootstrap_prereqs
      else
        _bootstrap_detect_pkg_manager() {
          for _m in apk apt-get yum dnf; do
            command -v "$_m" >/dev/null 2>&1 && echo "$_m" && return 0
          done
          echo ""
        }
        _mgr="$(_bootstrap_detect_pkg_manager)"
        if ! command -v yq >/dev/null 2>&1; then
          echo "[brik] Installing yq..."
          _yq_v="${BRIK_YQ_VERSION:-v4.44.1}" _arch="$(uname -m)" _os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          case "$_arch" in x86_64) _arch="amd64" ;; aarch64) _arch="arm64" ;; esac
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${_yq_v}/yq_${_os}_${_arch}" 2>/dev/null && chmod +x /usr/local/bin/yq || {
            echo "[brik] wget failed, falling back to apk..."
            case "$_mgr" in
              apk) apk add --no-cache yq ;;
            esac
          }
        fi
        for _t in jq git bash; do
          if ! command -v "$_t" >/dev/null 2>&1; then
            echo "[brik] Installing ${_t}..."
            case "$_mgr" in
              apk)     apk add --no-cache "$_t" ;;
              apt-get) apt-get update -qq 2>/dev/null; apt-get install -y -qq "$_t" ;;
              yum)     yum install -y "$_t" ;;
              dnf)     dnf install -y "$_t" ;;
            esac
          fi
        done
      fi
    # Install Docker CLI if socket is available (needed for package stage)
    - |
      if [ -S /var/run/docker.sock ] && ! command -v docker >/dev/null 2>&1; then
        echo "[brik] Installing Docker CLI..."
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache docker-cli
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq docker.io
        fi
      fi
    # Clone the Brik runtime if not already present
    - |
      if [ ! -d "${BRIK_HOME}" ]; then
        echo "[brik] Cloning Brik runtime (${BRIK_LIB_REF})..."
        git clone --depth 1 --branch "${BRIK_LIB_REF}" "${BRIK_REPO}" "${BRIK_HOME}" 2>/dev/null \
          || git clone --depth 1 "${BRIK_REPO}" "${BRIK_HOME}"
      fi
    # Prepare Brik bootstrap script (sourced by each job via bash)
    # Stack tools (node, python, java, etc.) are installed by setup.prepare_env
    # called inside brik.gitlab.setup
    - |
      cat > /tmp/brik-bootstrap.sh << 'BRIK_EOF'
      . "${BRIK_HOME}/shared-libs/gitlab/scripts/stage-wrapper.sh"
      brik.gitlab.setup "${BRIK_HOME}"
      BRIK_EOF
      chmod +x /tmp/brik-bootstrap.sh

# ---------------------------------------------------------------------------
# Include job templates
# ---------------------------------------------------------------------------
include:
  - local: '/templates/jobs/init.yml'
  - local: '/templates/jobs/release.yml'
  - local: '/templates/jobs/build.yml'
  - local: '/templates/jobs/quality.yml'
  - local: '/templates/jobs/security.yml'
  - local: '/templates/jobs/test.yml'
  - local: '/templates/jobs/package.yml'
  - local: '/templates/jobs/deploy.yml'
  - local: '/templates/jobs/notify.yml'
