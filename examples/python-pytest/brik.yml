version: 1

project:
  name: my-python-app
  stack: python
  stack_version: "3.13"

build:
  python_version: "3.12"

test:
  framework: pytest

quality:
  lint:
    tool: ruff
    config: ruff.toml
    fix: false
  format:
    tool: ruff format
    check: true

security:
  deps:
    severity: high
  secrets: {}
