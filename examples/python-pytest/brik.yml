version: 1

project:
  name: my-python-app
  stack: python
  description: Python service with pytest and ruff quality checks

build:
  python_version: "3.12"

test:
  framework: pytest

quality:
  enabled: true
  lint:
    tool: ruff
    config: ruff.toml
    fix: false
  format:
    tool: ruff format
    check: true
  deps:
    severity: high

security:
  dependency_scan: true
  secret_scan: true
  container_scan: false
