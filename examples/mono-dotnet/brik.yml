version: 1

project:
  name: my-dotnet-api
  stack: dotnet
  stack_version: "9.0"

build:
  dotnet_version: "8.0"
  command: dotnet build --configuration Release

test:
  framework: xunit
  commands:
    unit: dotnet test --filter Category=Unit
    integration: dotnet test --filter Category=Integration

quality:
  lint:
    tool: dotnet-format
    config: .editorconfig
    fix: false
  format:
    tool: dotnet-format
    check: true
